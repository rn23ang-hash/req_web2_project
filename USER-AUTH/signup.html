<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EcoShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../CSS/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/styles.css">
    <!-- <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script> -->

</head>

<body class="lcss-signup bg-gray-100 min-h-screen flex items-center justify-center p-4" style="font-family: 'Lexend';">
    <header class="lcss-signup_header_left">
        <a href="../index.html">
            <img src="../PICTURES/EcoShop_Logo_V2-2.svg" alt="EcoShop logo" title="">
        </a>
        
    </header>

    <main class="lcss-gen-flexcolumn bg-white p-8 rounded-2xl shadow-sm border border-gray-100 w-full max-w-md" style="border: solid black 1px">

    <form action="" class="signup-form">
        <div class="localfunc-signup-page lcss-gen-flexcolumn">
        
            <h1>SIGN UP</h1>

            <label for="user-email">Email</label>
            <input type="email" id="user-email" placeholder="Enter your email" name="email" class="lcss-gen-input">

            <label for="user-password">Password</label>
            <input type="password" name="password" id="user-password" placeholder="Enter your password" class="lcss-gen-input">

            <label for="user-confpassword">Confirm Password</label>
            <input type="password" id="user-confpassword" placeholder="Confirm your password" title="Match what you typed on the password input field" class="lcss-gen-input">

            <div class="localfunc-button-container">
                <button id="confirm-regis" type="button">NEXT</button>
            </div>
        </div>

        <div class="localfunc-signup-page">
            <h1>VERIFY YOUR EMAIL</h1>
            <p>We have sent an verification code to your email. Enter the code you received below to sign up.</p>
            <label for="verification-code">Enter Code</label>

            <input type="text" inputmode="numeric" pattern="[0-9]*" id="verification-code" required>

            <button class="" id="verify-input">VERIFY</button>
            <button id="prev-tab">Change email and password</button>
        </div>
    </form>
    </main>

    <script src="JS/signup.js"></script>
</body>
</html>
